<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmado</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #68B684;
      color: white;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    .icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 25px;
      background: #68B684;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 42px;
      font-weight: bold;
    }

    h1 {
      color: #68B684;
      font-size: 30px;
      margin-bottom: 15px;
    }

    p {
      color: #555;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      background: #68B684;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">✓</div>

    <h1>Email Confirmado!</h1>

    <p>
      Seu endereço de email foi confirmado com sucesso.
      Agora você já pode voltar ao aplicativo e continuar utilizando normalmente.
    </p>

    <a href="#" class="button">Voltar ao aplicativo</a>
  </div>
</body>
</html>
